name: PR Validation and AI Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Build, Check and AI Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history to enable diff comparison

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Astro Diagnostics (astro check)
        run: npm run check

      - name: Build Static Site
        run: npm run build

      - name: Fetch Target Branch
        run: git fetch origin main

      - name: Generate Diff for AI Review
        id: diff
        run: |
          # Generate diff for all changes, excluding lockfiles, images, documents, and assets
          git diff origin/main... ':!package-lock.json' ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.gif' ':!*.webp' ':!*.svg' ':!*.ico' ':!*.woff' ':!*.woff2' ':!*.pdf' > pr.diff
          
          if [ -s pr.diff ]; then
            echo "run_review=true" >> $GITHUB_ENV
          else
            echo "No changes found (excluding lockfile). Skipping AI review."
            echo "run_review=false" >> $GITHUB_ENV
          fi

      - name: Run Gemini Code Review
        if: env.run_review == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️ GEMINI_API_KEY is not defined. Skipping AI review."
            echo "comment_exists=false" >> $GITHUB_ENV
            echo "review_failed=false" >> $GITHUB_ENV
          else
            # Run the review script and write results to review.md.
            # Capture the exit status so the workflow does not stop before posting the comment.
            set +e
            node scripts/ai-review.mjs pr.diff > review.md
            exit_code=$?
            set -e
            
            # Check if file was created and is non-empty
            if [ -f review.md ] && [ -s review.md ]; then
              echo "comment_exists=true" >> $GITHUB_ENV
            else
              echo "comment_exists=false" >> $GITHUB_ENV
            fi
            
            # Record whether the review script failed
            if [ $exit_code -ne 0 ]; then
              echo "review_failed=true" >> $GITHUB_ENV
            else
              echo "review_failed=false" >> $GITHUB_ENV
            fi
          fi

      - name: Post Review Comment on PR
        if: env.comment_exists == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            // Read generated review file
            const review = fs.readFileSync('review.md', 'utf8');
            
            // Fetch list of comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Find existing review comment by the bot
            const botComment = comments.find(comment => 
              comment.body && 
              (comment.body.includes('AI Review Report - escal-ai') || comment.body.includes('Reporte de Revisión - escal-ai'))
            );
            
            const commentBody = `### 🤖 AI Review Report - escal-ai\n\n${review}`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
              console.log('Updated existing PR review comment.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
              console.log('Created new PR review comment.');
            }

      - name: Enforce AI Review Failure
        if: env.review_failed == 'true'
        run: |
          echo "❌ AI Review failed due to detected blocking issues or limit exceedance. Please see the PR comment above for details."
          exit 1

